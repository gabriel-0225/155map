<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>“十五五”产业思维导图</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f6f4ef;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-strong: #ffffff;
      --ink: #20242c;
      --muted: #687180;
      --line: rgba(55, 61, 75, 0.18);
      --shadow: 0 22px 60px rgba(46, 43, 36, 0.14);
      --accent: #1d7d73;
      --accent-2: #b45f39;
      --accent-3: #315da8;
      --accent-4: #8a6f24;
      --danger: #a44545;
      --node-root: #20242c;
      --node-root-text: #fff8ea;
      --node-theme: #ffffff;
      --node-industry: #fffdfa;
      --node-stock: #eef7f4;
      --node-risk: #fff0ed;
      --focus: #f7c85a;
      --chip: #ede7da;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
        "Hiragino Sans GB", "Microsoft YaHei", Arial, sans-serif;
    }

    body.dark {
      color-scheme: dark;
      --bg: #14171d;
      --panel: rgba(27, 31, 39, 0.92);
      --panel-strong: #20252f;
      --ink: #f3efe5;
      --muted: #aab2c0;
      --line: rgba(233, 226, 212, 0.2);
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.38);
      --node-root: #f1d38b;
      --node-root-text: #15181f;
      --node-theme: #20252f;
      --node-industry: #242a35;
      --node-stock: #18332f;
      --node-risk: #3b2426;
      --chip: #303642;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at 22% 12%, rgba(29, 125, 115, 0.14), transparent 28rem),
        radial-gradient(circle at 92% 8%, rgba(180, 95, 57, 0.13), transparent 25rem),
        linear-gradient(135deg, var(--bg), color-mix(in srgb, var(--bg), #fff 10%));
      color: var(--ink);
      overflow: hidden;
    }

    button,
    input,
    select {
      font: inherit;
    }

    .app {
      display: grid;
      grid-template-columns: 336px minmax(0, 1fr) 344px;
      min-height: 100vh;
    }

    .side,
    .inspector {
      position: relative;
      z-index: 3;
      min-height: 100vh;
      padding: 22px;
      background: var(--panel);
      backdrop-filter: blur(18px);
      border-color: var(--line);
      overflow: auto;
    }

    .side {
      border-right: 1px solid var(--line);
    }

    .inspector {
      border-left: 1px solid var(--line);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .mark {
      display: grid;
      place-items: center;
      width: 44px;
      height: 44px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-3));
      color: white;
      font-weight: 800;
      letter-spacing: 0;
      box-shadow: 0 14px 30px rgba(29, 125, 115, 0.28);
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
    }

    .subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }

    .section {
      margin-top: 18px;
      padding-top: 16px;
      border-top: 1px solid var(--line);
    }

    .section h2 {
      margin-bottom: 12px;
      font-size: 13px;
      letter-spacing: 0;
      color: var(--muted);
      text-transform: uppercase;
    }

    .control {
      display: grid;
      gap: 8px;
      margin-bottom: 14px;
    }

    .control label {
      color: var(--muted);
      font-size: 12px;
    }

    .control input[type="search"],
    .control select {
      width: 100%;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 11px;
      color: var(--ink);
      background: var(--panel-strong);
      outline: none;
    }

    .control input:focus,
    .control select:focus {
      border-color: color-mix(in srgb, var(--accent), white 20%);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent), transparent 78%);
    }

    .segmented {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 6px;
      padding: 4px;
      border-radius: 12px;
      background: var(--chip);
    }

    .segmented button,
    .toggle button,
    .utility {
      border: 0;
      border-radius: 9px;
      color: var(--ink);
      background: transparent;
      cursor: pointer;
    }

    .segmented button {
      min-height: 32px;
      font-size: 12px;
    }

    .segmented button.active,
    .toggle button.active {
      color: var(--node-root-text);
      background: var(--node-root);
      box-shadow: 0 9px 22px rgba(0, 0, 0, 0.14);
    }

    .switches {
      display: grid;
      gap: 8px;
    }

    .toggle {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      min-height: 42px;
      padding: 6px 6px 6px 12px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: var(--panel-strong);
    }

    .toggle span {
      font-size: 13px;
    }

    .toggle button {
      min-width: 54px;
      min-height: 30px;
      padding: 0 10px;
      background: var(--chip);
      font-size: 12px;
    }

    .theme-list {
      display: grid;
      gap: 8px;
    }

    .theme-card {
      display: grid;
      grid-template-columns: 16px 1fr auto;
      align-items: center;
      gap: 10px;
      width: 100%;
      min-height: 42px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      color: var(--ink);
      background: var(--panel-strong);
      text-align: left;
      cursor: pointer;
    }

    .theme-card.active {
      border-color: color-mix(in srgb, var(--accent), white 10%);
      box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--accent), transparent 55%);
    }

    .theme-dot {
      width: 12px;
      height: 12px;
      border-radius: 999px;
      background: var(--theme-color);
    }

    .theme-card small {
      color: var(--muted);
      font-size: 11px;
    }

    .canvas-wrap {
      position: relative;
      overflow: hidden;
      min-width: 0;
    }

    .topbar {
      position: absolute;
      inset: 18px 18px auto 18px;
      z-index: 2;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      pointer-events: none;
    }

    .hero-title {
      max-width: 620px;
      padding: 14px 16px;
      border: 1px solid var(--line);
      border-radius: 16px;
      background: var(--panel);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .hero-title h2 {
      font-size: 22px;
      line-height: 1.25;
    }

    .hero-title p {
      margin-top: 7px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.55;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      pointer-events: auto;
    }

    .utility {
      display: grid;
      place-items: center;
      min-width: 42px;
      height: 42px;
      border: 1px solid var(--line);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .canvas {
      width: 100%;
      height: 100vh;
      display: block;
      cursor: grab;
      touch-action: none;
    }

    .canvas:active {
      cursor: grabbing;
    }

    .link {
      fill: none;
      stroke: var(--line);
      stroke-width: 2;
      stroke-linecap: round;
      opacity: 0.86;
    }

    .node-foreign {
      overflow: visible;
    }

    .node-card {
      width: 100%;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      border: 1px solid var(--line);
      border-left: 6px solid var(--node-accent, var(--accent));
      border-radius: 14px;
      padding: 11px 13px;
      background: var(--node-theme);
      color: var(--ink);
      box-shadow: 0 16px 36px rgba(30, 32, 38, 0.13);
      transition: transform 160ms ease, box-shadow 160ms ease, border-color 160ms ease, background 160ms ease;
      cursor: pointer;
    }

    .node-card:hover,
    .node-card.selected {
      transform: translateY(-2px);
      border-color: color-mix(in srgb, var(--focus), var(--accent) 20%);
      box-shadow: 0 18px 42px rgba(30, 32, 38, 0.2);
    }

    .node-card.root {
      background: linear-gradient(135deg, var(--node-root), color-mix(in srgb, var(--node-root), #000 12%));
      color: var(--node-root-text);
      border: 0;
    }

    .node-card.collapsed {
      background: color-mix(in srgb, var(--node-theme), var(--chip) 26%);
      box-shadow: 0 10px 26px rgba(30, 32, 38, 0.1);
    }

    .node-card.industry {
      background: var(--node-industry);
    }

    .node-card.stock {
      background: var(--node-stock);
      border-style: dashed;
    }

    .node-card.risk {
      background: var(--node-risk);
      border-style: dashed;
    }

    .node-kicker {
      color: var(--muted);
      font-size: 11px;
      line-height: 1;
    }

    .node-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .node-toggle {
      display: inline-grid;
      place-items: center;
      flex: 0 0 auto;
      width: 30px;
      height: 30px;
      border-radius: 999px;
      color: var(--node-root-text);
      background: var(--node-accent, var(--accent));
      font-size: 18px;
      font-weight: 800;
      line-height: 1;
      box-shadow: 0 8px 18px color-mix(in srgb, var(--node-accent, var(--accent)) 28%, transparent);
    }

    .node-card.root .node-kicker {
      color: rgba(255, 248, 234, 0.72);
    }

    .node-title {
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      font-weight: 800;
      font-size: 14px;
      line-height: 1.3;
      letter-spacing: 0;
    }

    .node-note {
      overflow: hidden;
      text-overflow: ellipsis;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
    }

    .node-card.root .node-note {
      color: rgba(255, 248, 234, 0.76);
    }

    .node-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }

    .node-count {
      color: var(--muted);
      font-size: 10px;
      line-height: 1;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      max-width: 100%;
      height: 19px;
      padding: 0 7px;
      border-radius: 999px;
      color: var(--muted);
      background: color-mix(in srgb, var(--chip), transparent 10%);
      font-size: 10px;
      line-height: 1;
      white-space: nowrap;
    }

    .inspector-header {
      min-height: 132px;
      padding: 18px;
      border-radius: 18px;
      background: linear-gradient(135deg, var(--node-root), color-mix(in srgb, var(--node-root), #000 18%));
      color: var(--node-root-text);
      box-shadow: var(--shadow);
    }

    .inspector-header small {
      color: rgba(255, 248, 234, 0.72);
      font-size: 12px;
    }

    .inspector-header h2 {
      margin-top: 10px;
      font-size: 21px;
      line-height: 1.25;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 12px;
    }

    .meta span {
      padding: 5px 8px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.13);
      font-size: 11px;
    }

    .detail-block {
      margin-top: 18px;
    }

    .detail-block h3 {
      margin-bottom: 9px;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    .detail-card {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: var(--panel-strong);
      font-size: 13px;
      line-height: 1.65;
    }

    .stock-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .stock {
      padding: 8px 10px;
      border-radius: 999px;
      background: var(--chip);
      font-size: 12px;
      line-height: 1;
    }

    .option-list {
      display: grid;
      gap: 8px;
    }

    .option-button {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-height: 40px;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 8px 10px;
      color: var(--ink);
      background: var(--panel-strong);
      text-align: left;
      cursor: pointer;
    }

    .option-button span:first-child {
      font-size: 13px;
    }

    .option-button span:last-child {
      color: var(--muted);
      font-size: 11px;
    }

    .legend {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      min-height: 32px;
      color: var(--muted);
      font-size: 12px;
    }

    .legend-swatch {
      width: 18px;
      height: 18px;
      border-radius: 6px;
      border: 1px solid var(--line);
    }

    .empty-state {
      position: absolute;
      left: 50%;
      top: 50%;
      z-index: 4;
      display: none;
      width: min(420px, 80%);
      transform: translate(-50%, -50%);
      padding: 24px;
      border: 1px solid var(--line);
      border-radius: 20px;
      background: var(--panel);
      box-shadow: var(--shadow);
      text-align: center;
    }

    .empty-state.show {
      display: block;
    }

    .empty-state h2 {
      font-size: 18px;
    }

    .empty-state p {
      margin-top: 8px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }

    @media (max-width: 1180px) {
      body {
        overflow: auto;
      }

      .app {
        grid-template-columns: 300px minmax(0, 1fr);
      }

      .inspector {
        grid-column: 1 / -1;
        min-height: auto;
        border-left: 0;
        border-top: 1px solid var(--line);
      }

      .canvas {
        height: 720px;
      }
    }

    @media (max-width: 820px) {
      .app {
        display: block;
      }

      .side,
      .inspector {
        min-height: auto;
      }

      .topbar {
        position: static;
        padding: 14px;
        background: var(--panel);
      }

      .toolbar {
        flex-shrink: 0;
      }

      .canvas {
        height: 620px;
      }
    }

    :root {
      --bg: #f7f8f6;
      --panel: rgba(255, 255, 255, 0.9);
      --panel-strong: #ffffff;
      --ink: #18202b;
      --muted: #667181;
      --line: rgba(24, 32, 43, 0.12);
      --shadow: 0 22px 52px rgba(24, 32, 43, 0.1);
      --accent: #0f766e;
      --accent-2: #b36b2d;
      --accent-3: #1f4f82;
      --accent-4: #a17a23;
      --danger: #b4232f;
      --node-root: #18202b;
      --node-root-text: #fffaf0;
      --node-theme: #ffffff;
      --node-industry: #fbfcfa;
      --node-stock: #eef7f5;
      --node-risk: #fff3ef;
      --focus: #f7c867;
      --chip: #edf1ee;
    }

    body.dark {
      --bg: #121820;
      --panel: rgba(23, 30, 40, 0.92);
      --panel-strong: #1b2430;
      --ink: #f7f8f4;
      --muted: #a9b3c1;
      --line: rgba(232, 236, 226, 0.18);
      --node-theme: #1b2430;
      --node-industry: #202b36;
      --node-stock: #16352f;
      --node-risk: #3b2424;
      --chip: #2b3441;
    }

    body {
      background:
        linear-gradient(90deg, rgba(24, 32, 43, 0.04) 1px, transparent 1px),
        linear-gradient(rgba(24, 32, 43, 0.04) 1px, transparent 1px),
        linear-gradient(180deg, #fbfcfa 0%, var(--bg) 100%);
      background-size: 64px 64px, 64px 64px, auto;
    }

    .app {
      grid-template-columns: 304px minmax(0, 1fr) 324px;
    }

    .side,
    .inspector {
      background: rgba(255, 255, 255, 0.88);
    }

    body.dark .side,
    body.dark .inspector,
    body.dark .hero-title,
    body.dark .utility {
      background: rgba(23, 30, 40, 0.9);
    }

    .side {
      box-shadow: 16px 0 40px rgba(24, 32, 43, 0.05);
    }

    .inspector {
      box-shadow: -16px 0 40px rgba(24, 32, 43, 0.05);
    }

    .mark {
      border-radius: 10px;
      background: #18202b;
      box-shadow: none;
    }

    .section h2 {
      color: #536071;
      font-size: 12px;
      font-weight: 800;
    }

    .control input[type="search"],
    .control select,
    .toggle,
    .theme-card,
    .option-button,
    .detail-card {
      border-radius: 10px;
    }

    .segmented {
      border-radius: 10px;
      background: #edf1ee;
    }

    .segmented button,
    .toggle button,
    .utility,
    .map-action {
      border-radius: 8px;
    }

    .segmented button.active,
    .toggle button.active {
      background: #18202b;
    }

    .map-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin: -2px 0 14px;
    }

    .map-action {
      min-height: 36px;
      border: 1px solid var(--line);
      color: var(--ink);
      background: var(--panel-strong);
      cursor: pointer;
    }

    .map-action.primary {
      border-color: transparent;
      color: #fffaf0;
      background: #18202b;
    }

    .theme-card {
      min-height: 50px;
      transition: transform 160ms ease, border-color 160ms ease, box-shadow 160ms ease;
    }

    .theme-card:hover,
    .theme-card.active {
      transform: translateX(2px);
      border-color: color-mix(in srgb, var(--theme-color), white 16%);
      box-shadow: 0 10px 24px rgba(24, 32, 43, 0.08);
    }

    .canvas-wrap {
      background:
        linear-gradient(90deg, rgba(24, 32, 43, 0.05) 1px, transparent 1px),
        linear-gradient(rgba(24, 32, 43, 0.05) 1px, transparent 1px),
        #f7f8f6;
      background-size: 76px 76px, 76px 76px, auto;
    }

    .topbar {
      inset: 16px 16px auto 16px;
      align-items: stretch;
    }

    .hero-title {
      max-width: 580px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.88);
      box-shadow: 0 18px 42px rgba(24, 32, 43, 0.1);
    }

    .hero-title h2 {
      font-size: 20px;
    }

    .utility {
      border-radius: 10px;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 14px 32px rgba(24, 32, 43, 0.1);
      font-weight: 800;
    }

    .link {
      stroke-width: 2.2;
      opacity: 0.78;
    }

    .node-card {
      border-radius: 10px;
      border-left-width: 5px;
      padding: 12px 13px;
      box-shadow: 0 16px 34px rgba(24, 32, 43, 0.12);
    }

    .node-card.theme {
      background:
        linear-gradient(90deg, color-mix(in srgb, var(--node-accent, var(--accent)) 10%, transparent), transparent 42%),
        var(--node-theme);
    }

    .node-card.root {
      box-shadow: 0 20px 48px rgba(24, 32, 43, 0.22);
    }

    .node-card.stock,
    .node-card.risk {
      border-style: solid;
    }

    .node-toggle {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      box-shadow: none;
    }

    .node-title {
      font-size: 14px;
    }

    .node-note {
      -webkit-line-clamp: 2;
    }

    .tag,
    .stock,
    .meta span {
      border-radius: 8px;
    }

    .inspector-header {
      border-radius: 12px;
      box-shadow: 0 18px 42px rgba(24, 32, 43, 0.16);
    }

    body.embedded {
      overflow: hidden;
    }

    body.embedded .app {
      grid-template-columns: minmax(0, 1fr);
    }

    body.embedded .side,
    body.embedded .inspector {
      display: none;
    }

    body.embedded .hero-title {
      max-width: 500px;
    }

    body.embedded .canvas {
      height: 100vh;
    }

    @media (max-width: 1180px) {
      body.embedded {
        overflow: auto;
      }

      .app {
        grid-template-columns: 286px minmax(0, 1fr);
      }

      body.embedded .app {
        grid-template-columns: minmax(0, 1fr);
      }

      body.embedded .side,
      body.embedded .inspector {
        display: none;
      }
    }

    @media (max-width: 820px) {
      .side,
      .inspector {
        padding: 16px;
      }

      .topbar {
        position: static;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <aside class="side">
      <div class="brand">
        <div class="mark">15</div>

              type: "stock",
              note: industry.stocks.join(" · "),
              summary: `相关标的：${industry.stocks.join("、")}。`,
              risk: "观察池不等同于买入清单，需继续核对估值、业绩和资金面。",
              stocks: industry.stocks,
              tags: ["可筛选", "股票样本"]
            },
            {
              id: `${theme.id}-${index}-risk`,
              title: "主要风险",
              type: "risk",
              note: industry.risk,
              summary: industry.risk,
              risk: industry.risk,
              tags: ["风险约束"]
            }
          ]
        }))
      }))
    };

    const state = {
      density: "normal",
      depth: 3,
      themeFilter: "all",
      showStocks: true,
      showRisks: true,
      search: "",
      collapsedIds: new Set(themes.map((theme) => theme.id)),
      selectedId: "root",
      scale: 1,
      offsetX: 0,
      offsetY: 0,
      dragging: false,
      dragStart: null
    };

    const svg = document.getElementById("canvas");
    const emptyState = document.getElementById("emptyState");
    const themeFilter = document.getElementById("themeFilter");
    const themeList = document.getElementById("themeList");
    const detailType = document.getElementById("detailType");
    const detailTitle = document.getElementById("detailTitle");
    const detailMeta = document.getElementById("detailMeta");
    const detailSummary = document.getElementById("detailSummary");
    const detailStocks = document.getElementById("detailStocks");
    const detailRisk = document.getElementById("detailRisk");
    const stockBlock = document.getElementById("stockBlock");
    const nodeOptions = document.getElementById("nodeOptions");

    const nodeTypeLabel = {
      root: "总纲",
      theme: "政策主线",
      industry: "产业主题",
      stock: "A股观察池",
      risk: "风险约束"
    };

    function initControls() {
      themes.forEach((theme) => {
        const option = document.createElement("option");
        option.value = theme.id;
        option.textContent = theme.title;
        themeFilter.appendChild(option);

        const card = document.createElement("button");
        card.type = "button";
        card.className = "theme-card";
        card.dataset.id = theme.id;
        card.style.setProperty("--theme-color", theme.color);
        card.innerHTML = `<span class="theme-dot"></span><span>${theme.title}<br><small>${theme.note}</small></span><small>聚焦</small>`;
        card.addEventListener("click", () => {
          state.themeFilter = theme.id;
          themeFilter.value = theme.id;
          state.selectedId = theme.id;
          state.collapsedIds.delete(theme.id);
          render();
        });
        themeList.appendChild(card);
      });

      document.querySelectorAll("[data-setting='density'] button").forEach((button) => {
        button.addEventListener("click", () => {
          document.querySelectorAll("[data-setting='density'] button").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          state.density = button.dataset.value;
          render();
        });
      });

      document.getElementById("depth").addEventListener("change", (event) => {
        state.depth = Number(event.target.value);
        if (state.depth >= 4) expandSelectedPath();
        render();
      });

      document.getElementById("expandAll").addEventListener("click", () => {
        state.depth = Math.max(state.depth, 3);
        document.getElementById("depth").value = String(state.depth);
        state.collapsedIds.clear();
        render();
      });

      document.getElementById("collapseAll").addEventListener("click", () => {
        state.depth = 3;
        document.getElementById("depth").value = "3";
        state.collapsedIds = new Set(themes.map((theme) => theme.id));
        render();
      });

      themeFilter.addEventListener("change", (event) => {
        state.themeFilter = event.target.value;
        if (event.target.value !== "all") state.collapsedIds.delete(event.target.value);
        render();
      });

      document.getElementById("search").addEventListener("input", (event) => {
        state.search = event.target.value.trim().toLowerCase();
        render();
      });

      bindToggle("showStocks", "showStocks");
      bindToggle("showRisks", "showRisks");

      document.getElementById("darkMode").addEventListener("click", (event) => {
        document.body.classList.toggle("dark");
        const active = document.body.classList.contains("dark");
        event.currentTarget.classList.toggle("active", active);
        event.currentTarget.textContent = active ? "开启" : "关闭";
        render();
      });

      document.getElementById("zoomIn").addEventListener("click", () => {
        state.scale = Math.min(1.55, state.scale + 0.12);
        render();
      });

      document.getElementById("zoomOut").addEventListener("click", () => {
        state.scale = Math.max(0.55, state.scale - 0.12);
        render();
      });

      document.getElementById("resetView").addEventListener("click", () => {
        state.scale = 1;
        state.offsetX = 0;
        state.offsetY = 0;
        render();
      });

      svg.addEventListener("pointerdown", (event) => {
        state.dragging = true;
        state.dragStart = { x: event.clientX, y: event.clientY, ox: state.offsetX, oy: state.offsetY };
        svg.setPointerCapture(event.pointerId);
      });

      svg.addEventListener("pointermove", (event) => {
        if (!state.dragging) return;
        state.offsetX = state.dragStart.ox + (event.clientX - state.dragStart.x);
        state.offsetY = state.dragStart.oy + (event.clientY - state.dragStart.y);
        render();
      });

      svg.addEventListener("pointerup", () => {
        state.dragging = false;
      });

      window.addEventListener("resize", render);
    }

    function bindToggle(id, key) {
      document.getElementById(id).addEventListener("click", (event) => {
        state[key] = !state[key];
        event.currentTarget.classList.toggle("active", state[key]);
        event.currentTarget.textContent = state[key] ? "开启" : "关闭";
        render();
      });
    }

    function originalNodeById(id, node = root) {
      if (node.id === id) return node;
      for (const child of node.children || []) {
        const found = originalNodeById(id, child);
        if (found) return found;
      }
      return null;
    }

    function hasEligibleChildren(node, depth) {
      if (!node.children || depth >= state.depth) return false;
      return node.children.some((child) => {
        if (state.themeFilter !== "all" && depth + 1 === 2 && child.id !== state.themeFilter) return false;
        if (child.type === "stock" && !state.showStocks) return false;
        if (child.type === "risk" && !state.showRisks) return false;
        return true;
      });
    }

    function expandSelectedPath() {
      const path = [];
      function walk(node, trail) {
        if (node.id === state.selectedId) {
          path.push(...trail);
          return true;
        }
        return (node.children || []).some((child) => walk(child, [...trail, node.id]));
      }
      walk(root, []);
      path.forEach((id) => state.collapsedIds.delete(id));
    }

    function visibleTree(node, depth = 1) {
      if (state.themeFilter !== "all" && depth === 2 && node.id !== state.themeFilter) {
        return null;
      }

      if (depth > state.depth) return null;
      if (node.type === "stock" && !state.showStocks) return null;
      if (node.type === "risk" && !state.showRisks) return null;

      const canCollapse = node.type !== "root" && hasEligibleChildren(node, depth);
      const isCollapsed = canCollapse && state.collapsedIds.has(node.id) && !state.search;
      const cloned = {
        ...node,
        children: [],
        canCollapse,
        collapsed: isCollapsed,
        childCount: (node.children || []).length
      };
      if (node.children && depth < state.depth && !isCollapsed) {
        cloned.children = node.children
          .map((child) => visibleTree(child, depth + 1))
          .filter(Boolean);
      }

      if (!state.search) return cloned;
      const ownText = `${node.title} ${node.note || ""} ${node.summary || ""} ${(node.stocks || []).join(" ")}`.toLowerCase();
      const matched = ownText.includes(state.search);
      if (matched || cloned.children.length > 0) {
        cloned.matched = matched;
        return cloned;
      }
      return null;
    }

    function layout(tree) {
      const rows = [];
      const widthMap = { compact: 150, normal: 190, detail: 238 };
      const heightMap = { compact: 72, normal: 88, detail: 112 };
      const xGapMap = { compact: 220, normal: 280, detail: 340 };
      const yGapMap = { compact: 20, normal: 28, detail: 34 };
      const nodeWidth = widthMap[state.density];
      const nodeHeight = heightMap[state.density];
      const xGap = xGapMap[state.density];
      const yGap = yGapMap[state.density];

      function walk(node, depth = 0, parent = null) {
        const item = {
          ...node,
          depth,
          parent,
          width: depth === 0 ? nodeWidth + 42 : nodeWidth,
          height: depth <= 1 ? nodeHeight + 8 : nodeHeight,
          x: depth * xGap,
          y: 0
        };
        rows.push(item);
        item.children = (node.children || []).map((child) => walk(child, depth + 1, item));
        return item;
      }

      const laidRoot = walk(tree);
      let cursor = 0;

      function assignY(node) {
        if (!node.children.length) {
          node.y = cursor;
          cursor += node.height + yGap;
        } else {
          node.children.forEach(assignY);
          const first = node.children[0];
          const last = node.children[node.children.length - 1];
          node.y = (first.y + last.y) / 2;
        }
      }

      assignY(laidRoot);
      return { root: laidRoot, nodes: rows, nodeWidth, nodeHeight };
    }

    function render() {
      const tree = visibleTree(root);
      svg.innerHTML = "";
      updateThemeCards();

      if (!tree) {
        emptyState.classList.add("show");
        return;
      }
      emptyState.classList.remove("show");

      const { nodes } = layout(tree);
      if (!nodes.find((node) => node.id === state.selectedId)) {
        state.selectedId = tree.id;
      }

      const bounds = svg.getBoundingClientRect();
      const minY = Math.min(...nodes.map((node) => node.y - node.height / 2));
      const maxY = Math.max(...nodes.map((node) => node.y + node.height / 2));
      const minX = Math.min(...nodes.map((node) => node.x - node.width / 2));
      const maxX = Math.max(...nodes.map((node) => node.x + node.width / 2));
      const graphW = maxX - minX;
      const graphH = maxY - minY;
      const startX = Math.max(110, (bounds.width - graphW * state.scale) / 2) + state.offsetX;
      const startY = Math.max(120, (bounds.height - graphH * state.scale) / 2) + state.offsetY;

      const g = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.setAttribute("transform", `translate(${startX}, ${startY - minY * state.scale}) scale(${state.scale})`);
      svg.appendChild(g);

      const linkGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
      const nodeGroup = document.createElementNS("http://www.w3.org/2000/svg", "g");
      g.appendChild(linkGroup);
      g.appendChild(nodeGroup);

      nodes.forEach((node) => {
        if (!node.parent) return;
        const start = { x: node.parent.x + node.parent.width / 2, y: node.parent.y };
        const end = { x: node.x - node.width / 2, y: node.y };
        const elbow = start.x + Math.max(38, (end.x - start.x) * 0.45);
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("class", "link");
        path.setAttribute("d", `M ${start.x} ${start.y} C ${elbow} ${start.y}, ${elbow} ${end.y}, ${end.x} ${end.y}`);
        if (node.color) path.setAttribute("stroke", colorMix(node.color, getComputedStyle(document.body).getPropertyValue("--line"), 0.38));
        linkGroup.appendChild(path);
      });

      nodes.forEach((node) => {
        const foreign = document.createElementNS("http://www.w3.org/2000/svg", "foreignObject");
        foreign.setAttribute("class", "node-foreign");
        foreign.setAttribute("x", node.x - node.width / 2);
        foreign.setAttribute("y", node.y - node.height / 2);
        foreign.setAttribute("width", node.width);
        foreign.setAttribute("height", node.height + 8);

        const card = document.createElement("div");
        card.className = `node-card ${node.type}`;
        if (node.collapsed) card.classList.add("collapsed");
        if (node.id === state.selectedId) card.classList.add("selected");
        if (node.color && node.type !== "root") {
          card.style.borderColor = colorMix(node.color, "#ffffff", 0.58);
          card.style.setProperty("--node-accent", node.color);
        }
        if (node.type === "root") {
          card.style.setProperty("--node-accent", "var(--node-root)");
        }
        const toggleSymbol = node.canCollapse ? (node.collapsed ? "+" : "−") : "";
        const childCount = node.canCollapse ? `<span class="node-count">${node.collapsed ? "已收起" : "已展开"} · ${node.childCount}</span>` : "";
        card.innerHTML = `
          <span class="node-top"><span class="node-kicker">${nodeTypeLabel[node.type] || "投研条目"}</span>${toggleSymbol ? `<span class="node-toggle">${toggleSymbol}</span>` : ""}</span>
          <span class="node-title">${escapeHtml(node.title)}</span>
          <span class="node-note">${escapeHtml(node.note || "")}</span>
          ${state.density === "detail" ? `<span class="node-tags">${(node.tags || []).slice(0, 2).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join("")}</span>` : childCount}
        `;
        card.addEventListener("pointerdown", (event) => {
          event.stopPropagation();
        });
        card.addEventListener("click", (event) => {
          event.stopPropagation();
          state.selectedId = node.id;
          if (node.canCollapse) {
            if (state.collapsedIds.has(node.id)) {
              state.collapsedIds.delete(node.id);
            } else {
              state.collapsedIds.add(node.id);
            }
          }
          updateInspector(node);
          render();
        });
        foreign.appendChild(card);
        nodeGroup.appendChild(foreign);
      });

      updateInspector(nodes.find((node) => node.id === state.selectedId) || tree);
    }

    function updateThemeCards() {
      document.querySelectorAll(".theme-card").forEach((card) => {
        card.classList.toggle("active", card.dataset.id === state.themeFilter);
      });
    }

    function updateInspector(node) {
      detailType.textContent = nodeTypeLabel[node.type] || "投研条目";
      detailTitle.textContent = node.title;
      detailMeta.innerHTML = "";
      (node.tags || []).forEach((tag) => {
        const span = document.createElement("span");
        span.textContent = tag;
        detailMeta.appendChild(span);
      });
      if (node.color) {
        const span = document.createElement("span");
        span.textContent = "主线色";
        span.style.background = node.color;
        span.style.color = "#fff";
        detailMeta.appendChild(span);
      }
      detailSummary.textContent = node.summary || node.note || "选择产业主题后呈现完整投研逻辑。";
      detailRisk.textContent = node.risk || "暂无单独风险约束。";

      const stocks = node.stocks || collectStocks(node);
      stockBlock.style.display = stocks.length ? "block" : "none";
      detailStocks.innerHTML = stocks.map((stock) => `<span class="stock">${escapeHtml(stock)}</span>`).join("");

      nodeOptions.innerHTML = "";
      const options = [];
      const original = originalNodeById(node.id);
      if (node.type !== "root" && original && original.children && original.children.length) {
        options.push([state.collapsedIds.has(node.id) ? "展开下级主题" : "收起下级主题", "层级", () => {
          if (state.collapsedIds.has(node.id)) {
            state.collapsedIds.delete(node.id);
          } else {
            state.collapsedIds.add(node.id);
          }
          render();
        }]);
      }
      if (node.type === "theme") {
        options.push(["聚焦这条主线", "筛选", () => {
          state.themeFilter = node.id;
          themeFilter.value = node.id;
          state.collapsedIds.delete(node.id);
          render();
        }]);
        options.push(["纳入股票与风险", "深度", () => {
          state.depth = 4;
          document.getElementById("depth").value = "4";
          state.collapsedIds.delete(node.id);
          render();
        }]);
      }
      if (node.type === "industry") {
        options.push(["聚焦该产业", "检索", () => {
          document.getElementById("search").value = node.title;
          state.search = node.title.toLowerCase();
          render();
        }]);
        options.push(["剔除风险约束", "简化", () => {
          state.showRisks = false;
          const button = document.getElementById("showRisks");
          button.classList.remove("active");
          button.textContent = "关闭";
          render();
        }]);
      }
      options.push(["恢复全部主线", "重置", () => {
        state.themeFilter = "all";
        themeFilter.value = "all";
        document.getElementById("search").value = "";
        state.search = "";
        state.collapsedIds = new Set(themes.map((theme) => theme.id));
        render();
      }]);

      options.forEach(([title, hint, action]) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "option-button";
        button.innerHTML = `<span>${title}</span><span>${hint}</span>`;
        button.addEventListener("click", action);
        nodeOptions.appendChild(button);
      });
    }

    function collectStocks(node) {
      const stocks = new Set();
      function walk(item) {
        (item.stocks || []).forEach((stock) => stocks.add(stock));
        (item.children || []).forEach(walk);
      }
      walk(node);
      return [...stocks].slice(0, 18);
    }

    function colorMix(color, fallback, weight) {
      if (!color || !color.startsWith("#")) return fallback;
      const hex = color.replace("#", "");
      const bigint = parseInt(hex, 16);
      const r = (bigint >> 16) & 255;
      const g = (bigint >> 8) & 255;
      const b = bigint & 255;
      return `rgba(${r}, ${g}, ${b}, ${weight})`;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    initControls();
    render();
  </script>
</body>
</html>
